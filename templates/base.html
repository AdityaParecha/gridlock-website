<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>GRIDLOCK — Parking Violation Hotspot Predictor</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #f4f6f8; }
        nav { background: #1f2d3d; padding: 14px 24px; }
        nav a { color: white; text-decoration: none; margin-right: 24px; font-weight: bold; }
        nav a:hover { text-decoration: underline; }
        .container { max-width: 1100px; margin: 24px auto; background: white; padding: 24px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h2 { color: #1f2d3d; }
        label { display: inline-block; margin: 8px 0; }
        input { padding: 6px; margin-left: 6px; }
        button { background: #1f77b4; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        button:hover { background: #155d8b; }
        table { margin-top: 16px; border-collapse: collapse; width: 100%; }
        th, td { padding: 8px 12px; text-align: left; }
        th { background: #1f2d3d; color: white; }
        tr:nth-child(even) { background: #f0f0f0; }
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Predict Hotspots</a>
        <a href="/compare">Compare Predicted vs Actual</a>
        <a href="/demo">Demo: Update Model</a>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
